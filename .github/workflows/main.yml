name: TG10X Founder Monitor

on:
  workflow_dispatch:

  schedule:
    # Runs twice every hour, at minute 7 and minute 37
    - cron: "7,37 * * * *"

permissions:
  contents: write

concurrency:
  group: tg10x-founder-monitor
  cancel-in-progress: false

jobs:
  check-founders:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Check TG10X founders
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python monitor.py

      - name: Save monitoring state
        run: |
          git config user.name "tg10x-news-monitor"
          git config user.email "actions@users.noreply.github.com"

          if [ ! -f seen_items.json ]; then
            echo "seen_items.json was not created."
            exit 1
          fi

          git add seen_items.json

          if git diff --cached --quiet; then
            echo "No state changes to save."
            exit 0
          fi

          git commit -m "Update TG10X founder monitoring state"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
